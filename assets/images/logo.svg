<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 烽审榜 Logo SVG占位 - 红色印章 + 文字 -->
  <defs>
    <filter id="rough">
      <feTurbulence baseFrequency="0.05" numOctaves="2" />
      <feDisplacementMap in="SourceGraphic" scale="3" />
    </filter>
  </defs>
  
  <!-- 红色印章方块 -->
  <rect x="20" y="20" width="160" height="160" 
        fill="#c8102e" 
        stroke="#8b0a1f" 
        stroke-width="2"
        rx="4" 
        filter="url(#rough)"/>
  
  <!-- 内边框 -->
  <rect x="30" y="30" width="140" height="140" 
        fill="none" 
        stroke="#fff" 
        stroke-width="2"
        rx="2"/>
  
  <!-- 烽字（简化） -->
  <text x="100" y="105" 
        font-family="STKaiti, KaiTi, serif" 
        font-size="80" 
        font-weight="900"
        fill="#fff" 
        text-anchor="middle"
        filter="url(#rough)">烽</text>
  
  <!-- 角标小字 -->
  <text x="100" y="148" 
        font-family="serif" 
        font-size="12" 
        fill="#fff" 
        text-anchor="middle"
        letter-spacing="2">FENG</text>
</svg>
