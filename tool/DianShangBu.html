<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>京州口腔 · 澯烽数据清洗工具 — 电商日报表格式</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f6fa;
  color: #2d3436;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
h1 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}
h1 small {
  font-size: 13px;
  font-weight: 400;
  color: #636e72;
}
.subtitle {
  color: #636e72;
  font-size: 14px;
  margin-bottom: 20px;
}
.card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  padding: 20px;
  margin-bottom: 16px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.card-header h2 {
  font-size: 16px;
  font-weight: 600;
}
.row {
  display: flex;
  gap: 16px;
}
.col {
  flex: 1;
  min-width: 0;
}
label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  color: #555;
}
textarea {
  width: 100%;
  min-height: 360px;
  padding: 12px;
  font-size: 13px;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  border: 1px solid #dcdde1;
  border-radius: 6px;
  resize: vertical;
  outline: none;
  transition: border-color .2s;
}
textarea:focus { border-color: #0984e3; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 24px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .2s;
}
.btn:hover { opacity: .85; }
.btn-primary { background: #0984e3; color: #fff; }
.btn-success { background: #00b894; color: #fff; }
.btn-warning { background: #fdcb6e; color: #2d3436; }
.btn-danger { background: #d63031; color: #fff; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.status {
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  display: none;
}
.status.success { display: block; background: #dfe6e9; color: #00b894; }
.status.error { display: block; background: #ffeaa7; color: #d63031; }
.status.info { display: block; background: #dfe6e9; color: #0984e3; }

/* 输出表格 */
.output-wrap {
  overflow-x: auto;
  margin-top: 10px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  white-space: nowrap;
}
thead th {
  background: #0984e3;
  color: #fff;
  padding: 8px 6px;
  font-weight: 500;
  position: sticky;
  top: 0;
  z-index: 1;
}
tbody td {
  padding: 6px;
  border-bottom: 1px solid #eee;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
}
tbody tr:hover { background: #f0f8ff; }
tbody tr:nth-child(even) { background: #fafafa; }
tbody tr:nth-child(even):hover { background: #f0f8ff; }

/* TSV 输出区 */
.output-tsv-wrap {
  margin-top: 10px;
}
.output-tsv-wrap textarea {
  min-height: 200px;
  font-size: 12px;
}
.meta-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
  color: #636e72;
}
.copy-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #00b894;
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 14px;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  z-index: 999;
}
.copy-toast.show { opacity: 1; }

/* 响应式 */
@media (max-width: 768px) {
  .row { flex-direction: column; }
  body { padding: 12px; }
}

/* ============ 密码锁 ============ */
#passwordOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.password-box {
  background: #fff;
  border-radius: 16px;
  padding: 40px 48px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  text-align: center;
  max-width: 380px;
  width: 90%;
}
.password-box .icon { font-size: 48px; margin-bottom: 12px; }
.password-box h2 { font-size: 20px; margin-bottom: 6px; color: #2d3436; }
.password-box p { font-size: 13px; color: #636e72; margin-bottom: 20px; }
.password-box input {
  width: 100%; padding: 12px 16px; font-size: 16px;
  border: 2px solid #dcdde1; border-radius: 8px;
  outline: none; text-align: center; letter-spacing: 8px;
  transition: border-color .2s; box-sizing: border-box;
}
.password-box input:focus { border-color: #667eea; }
.password-box .pwd-error {
  color: #d63031; font-size: 13px; margin-top: 8px; display: none;
}
.password-box .pwd-submit {
  width: 100%; margin-top: 14px; padding: 12px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity .2s;
}
.password-box .pwd-submit:hover { opacity: .85; }
.password-box .hint {
  font-size: 11px; color: #b2bec3; margin-top: 12px;
}
</style>
<script>
(function(){
  // 前端防护：禁用右键/复制门槛（非绝对安全，仅挡普通用户）
  document.addEventListener('contextmenu', function(e){
    if(e.target && e.target.id === 'inputJson') return; // 输入框允许右键粘贴
    e.preventDefault();
  });
  document.addEventListener('keydown', function(e){
    var k = e.key ? e.key.toLowerCase() : '';
    if(e.key === 'F12'){ e.preventDefault(); return; }
    if((e.ctrlKey||e.metaKey) && e.shiftKey && (k==='i'||k==='j'||k==='c')){ e.preventDefault(); return; }
    if((e.ctrlKey||e.metaKey) && k==='u'){ e.preventDefault(); return; }
    if(e.metaKey && e.altKey && (k==='i'||k==='u'||k==='c')){ e.preventDefault(); return; }
  });
})();
</script>
</head>

<!-- ============ 密码验证 ============ -->
<div id="passwordOverlay">
  <div class="password-box">
    <div class="icon">🔐</div>
    <h2>京州口腔 · 数据清洗工具</h2>
    <p>请输入访问密码后使用</p>
    <input type="password" id="pwdInput" maxlength="10" placeholder="请输入密码" autofocus>
    <div class="pwd-error" id="pwdError">❌ 密码错误，请重试</div>
    <button class="pwd-submit" onclick="checkPassword()">验证</button>
    <div class="hint">联系管理员获取密码</div>
  </div>
</div>

<div id="appContent" style="display:none">

<h1>🦷 京州口腔 · 澯烽数据清洗工具 <small>JSON → 可粘贴表格（电商日报表格式）</small></h1>
<p class="subtitle">从京州口腔系统JSON提取预约数据，按「电商部日报表模板7.10」23列要求清洗，直接粘贴到Excel</p>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="card-header">
        <h2>📥 粘贴原始数据</h2>
      </div>
      <textarea id="inputJson" placeholder='将系统导出的JSON内容粘贴到这里...'></textarea>

        <span style="font-size:12px;color:#636e72;margin-left:4px">（可直接粘贴到 Excel）</span>
      </div>
    </div>
    <div class="meta-bar">

      </div>

      <textarea id="tsvOutput" readonly></textarea>
    </div>
  </div>
</div>
