function shortenClinic(fullName) {
  if (!fullName) return '';
  return CLINIC_MAP[fullName] || fullName;
}

// ============ 初复诊映射 ============
function mapCheckInType(type) {
  if (!type) return '';
  if (type === '初诊') return '初';
  if (type === '复诊') return '复';
  return type;
}

// ============ 格式化日期 ============
function formatDate(datetimeStr) {
  if (!datetimeStr) return '';
  return datetimeStr.substring(0, 10);
}

// ============ 工作簿2.xlsx 的25列映射 ============
/*
  1:最后沟通时间  2:初诊/复诊  3:性别  4:姓名  5:电话
  6:病例ID  7:主诉  8:来源  9:创建预约日期  10:预约日期
  11:到诊日期  12:应收  13:欠费  14:实收  15:预约门店
  16:接诊医生  17:接诊咨询  18:网电客服  19:潜在需求  20:方案价
  21:未成交原因  22:未按时到院原因  23:备注  24:明湖院内反馈  25:是否电话客服二次跟进成交
*/
function extractRows(items) {
  if (!items || !items.length) return [];
  return items.map(item => [
    /* 1 最后沟通时间  */ formatDate(item.recordCreatedTime),
    /* 2 初诊/复诊    */ mapCheckInType(item.checkInType),
    /* 3 性别         */ '',  // JSON无此字段
    /* 4 姓名         */ item.patientName || '',
    /* 5 电话         */ item.mobile || '',
    /* 6 病例ID       */ item.patientId !== undefined && item.patientId !== null ? String(item.patientId) : '',
    /* 7 主诉         */ item.transactionNames || '',
    /* 8 来源         */ item.patientRefereeName || '',
    /* 9 创建预约日期 */ formatDate(item.recordCreatedTime),
    /*10 预约日期     */ formatDate(item.startTime),
    /*11 到诊日期     */ formatDate(item.checkInTime),
    /*12 应收         */ '',
    /*13 欠费         */ '',
    /*14 实收         */ '',
    /*15 预约门店     */ shortenClinic(item.officeName),
    /*16 接诊医生     */ item.doctorName || '',
    /*17 接诊咨询     */ item.consultantName || '',
    /*18 网电客服     */ item.onlineConsultantName || '',
    /*19 潜在需求     */ '',
    /*20 方案价       */ '',
    /*21 未成交原因   */ '',
    /*22 未按时到院原因 */ '',
    /*23 备注         */ item.notes || '',
    /*24 明湖院内反馈 */ '',
    /*25 是否电话客服二次跟进成交 */ '',
  ]);
}

// ============ 渲染表格 ============
const HEADERS = [
  '最后沟通时间','初诊/复诊','性别','姓名','电话',
  '病例ID','主诉','来源','创建预约日期','预约日期',
  '到诊日期','应收','欠费','实收','预约门店',
  '接诊医生','接诊咨询','网电客服','潜在需求','方案价',
  '未成交原因','未按时到院原因','备注','明湖院内反馈','是否电话客服二次跟进成交'
];

function renderPreview(rows) {
  const wrap = document.getElementById('tablePreview');
  if (!rows.length) {
    wrap.innerHTML = '<p style="color:#636e72;padding:20px;text-align:center">没有提取到数据</p>';
    return;
  }
  let html = '<table><thead><tr>';
  HEADERS.forEach(h => { html += `<th>${h}</th>`; });
  html += '</tr></thead><tbody>';
  rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => {
      const val = cell || '';
      html += `<td title="${val.replace(/"/g,'&quot;')}">${val}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// ============ 生成 TSV ============
function generateTSV(rows) {
  // 用户固定表格已有表头，仅输出数据行
  const dataLines = rows.map(row => row.join('\t'));
  return dataLines.join('\n');
}

// ============ 主入口：解析 ============
function parseData() {
  const raw = document.getElementById('inputJson').value.trim();
  const status = document.getElementById('parseStatus');
  const panel = document.getElementById('outputPanel');

  if (!raw) {
    status.className = 'status error';
    status.textContent = '⚠️ 请先粘贴JSON数据';
    return;
  }

  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch (e) {
    status.className = 'status error';
    status.textContent = `❌ JSON 解析失败：${e.message}`;
    return;
  }

  // 支持 {items:[...]} 或 直接数组
  let items = parsed.items || parsed;
  if (!Array.isArray(items)) {
    status.className = 'status error';
    status.textContent = '❌ 未找到可解析的记录数组（期望 items 字段或直接数组）';
    return;
  }

  const rows = extractRows(items);
  document.getElementById('rowCount').textContent = rows.length;

  renderPreview(rows);
  document.getElementById('tsvOutput').value = generateTSV(rows);

  panel.style.display = 'block';
  status.className = 'status success';
  status.textContent = `✅ 成功清洗 ${rows.length} 条记录，共 25 列（工作簿2格式）`;
}

// ============ 复制 TSV ============
function copyTSV() {
  const tsv = document.getElementById('tsvOutput');
  tsv.select();
  tsv.setSelectionRange(0, 999999);
  try {
    document.execCommand('copy');
    showToast('✅ 已复制到剪贴板，可直接粘贴到 Excel');
  } catch (e) {
    navigator.clipboard.writeText(tsv.value).then(() => {
      showToast('✅ 已复制到剪贴板');
    }).catch(() => {
      alert('复制失败，请手动选中文本后 Ctrl+C / Cmd+C');
    });
  }
}

function showToast(msg) {
  const t = document.getElementById('copyToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
