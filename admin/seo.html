<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全局SEO - 烽审榜 CMS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <script src="../assets/js/theme.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="../assets/images/logo.png" alt="烽审榜" class="sidebar-logo">
        <span>烽审榜 CMS</span>
        <div id="theme-toggle-mount" class="theme-toggle-mount theme-toggle-mount--sidebar"></div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">📊 仪表盘</a>
        <a href="profile.html">👤 关于我</a>
        <a href="services.html">🎯 主营业务</a>
        <a href="blog.html">📝 博客文章</a>
        <a href="cases.html">🏆 客户案例</a>
        <a href="ads.html">📢 广告位</a>
        <a href="seo.html" class="active">🔍 全局SEO</a>
        <a href="settings.html">⚙️ 站点设置</a>
        <a href="audit.html">🛡️ 安全审计</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../index.html" target="_blank">🌐 查看站点</a>
        <a href="#" id="logoutBtn">🚪 退出登录</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">全局SEO设置</h1>
        <p class="page-desc">为每个静态页面设置全局 SEO 信息。⚠️ 单个内容的 SEO 请在对应模块中编辑（业务/博客/案例都有独立 SEO）。</p>
      </div>

      <div class="editor-panel">
        <h2 class="editor-panel-title">🏠 首页 SEO</h2>
        <p class="editor-panel-desc">这是网站首页在搜索引擎的展示信息。</p>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="home_title" placeholder="网站首页标题">
          <p class="form-hint">字符数: <span id="homeTitleLen">0</span> / 60</p>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="home_desc" style="min-height:80px;"></textarea>
          <p class="form-hint">字符数: <span id="homeDescLen">0</span> / 160</p>
        </div>
        <div class="form-group">
          <label class="form-label">Keywords</label>
          <input type="text" class="form-input" id="home_keywords">
        </div>
        <div class="form-group">
          <label class="form-label">OG Image</label>
          <input type="text" class="form-input" id="home_ogImage" placeholder="社交分享图URL">
        </div>
      </div>

      <div class="editor-panel">
        <h2 class="editor-panel-title">🎯 业务页 SEO</h2>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="services_title">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="services_desc" style="min-height:80px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Keywords</label>
          <input type="text" class="form-input" id="services_keywords">
        </div>
      </div>

      <div class="editor-panel">
        <h2 class="editor-panel-title">📝 博客页 SEO</h2>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="blog_title">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="blog_desc" style="min-height:80px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Keywords</label>
          <input type="text" class="form-input" id="blog_keywords">
        </div>
      </div>

      <div class="editor-panel">
        <h2 class="editor-panel-title">🏆 案例页 SEO</h2>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="cases_title">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="cases_desc" style="min-height:80px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Keywords</label>
          <input type="text" class="form-input" id="cases_keywords">
        </div>
      </div>

      <div class="editor-actions">
        <button class="btn btn-primary" id="saveBtn">保存所有</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/security.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="admin.js"></script>
  <script>
    const PAGES = ['home', 'services', 'blog', 'cases'];

    document.addEventListener('DOMContentLoaded', function () {
      checkAuth();
      document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); logout(); });
      loadSEO();
      document.getElementById('saveBtn').addEventListener('click', saveAll);
      ['home_title', 'home_desc'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateCharCount);
      });
    });

    async function loadSEO() {
      // 首页 SEO 来自 config.json（后台可改、前台生效）
      const cfg = await DataStore.getConfig();
      const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
      setVal('home_title', cfg.homeTitle);
      setVal('home_desc', cfg.homeDescription);
      setVal('home_keywords', cfg.homeKeywords);
      setVal('home_ogImage', cfg.homeOgImage);
      // 其他页仍走本地 SEO 存储
      ['services', 'blog', 'cases'].forEach(page => {
        const seo = DataStore.getSEO('page_' + page) || {};
        setVal(`${page}_title`, seo.title);
        setVal(`${page}_desc`, seo.description);
        setVal(`${page}_keywords`, seo.keywords);
        setVal(`${page}_ogImage`, seo.ogImage);
      });
      updateCharCount();
    }

    function updateCharCount() {
      const t = document.getElementById('home_title').value;
      const d = document.getElementById('home_desc').value;
      const tl = document.getElementById('homeTitleLen');
      const dl = document.getElementById('homeDescLen');
      if (tl) tl.textContent = t.length;
      if (dl) dl.textContent = d.length;
    }

    async function saveAll() {
      // 首页 SEO 写回 config.json（触发重新部署，前台约1-2分钟生效）
      const cfg = await DataStore.getConfig();
      cfg.homeTitle = (document.getElementById('home_title') || {}).value?.trim() || '';
      cfg.homeDescription = (document.getElementById('home_desc') || {}).value?.trim() || '';
      cfg.homeKeywords = (document.getElementById('home_keywords') || {}).value?.trim() || '';
      cfg.homeOgImage = (document.getElementById('home_ogImage') || {}).value?.trim() || '';
      await DataStore.saveConfig(cfg);
      // 其他页仍存本地 SEO
      ['services', 'blog', 'cases'].forEach(page => {
        const data = {
          title: (document.getElementById(`${page}_title`) || {}).value?.trim() || '',
          description: (document.getElementById(`${page}_desc`) || {}).value?.trim() || '',
          keywords: (document.getElementById(`${page}_keywords`) || {}).value?.trim() || '',
          ogImage: (document.getElementById(`${page}_ogImage`) || {}).value?.trim() || ''
        };
        DataStore.saveSEO('page_' + page, data);
      });
      showToast('所有SEO已保存', 'success');
    }
  </script>
</body>
</html>
