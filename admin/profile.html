<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于我 - 烽审榜 CMS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="../assets/images/logo.png" alt="烽审榜" class="sidebar-logo">
        <span>烽审榜 CMS</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">📊 仪表盘</a>
        <a href="profile.html" class="active">👤 关于我</a>
        <a href="services.html">🎯 主营业务</a>
        <a href="blog.html">📝 博客文章</a>
        <a href="cases.html">🏆 客户案例</a>
        <a href="ads.html">📢 广告位</a>
        <a href="seo.html">🔍 全局SEO</a>
        <a href="settings.html">⚙️ 站点设置</a>
        <a href="audit.html">🛡️ 安全审计</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../index.html" target="_blank">🌐 查看站点</a>
        <a href="#" id="logoutBtn">🚪 退出登录</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">关于我</h1>
        <p class="page-desc">编辑首页和关于页的「个人介绍」内容。</p>
      </div>

      <div class="editor-panel">
        <h2 class="editor-panel-title">👤 个人信息</h2>
        <p class="editor-panel-desc">这些信息会展示在首页的「关于我」区域。</p>

        <div class="form-group">
          <label class="form-label">姓名</label>
          <input type="text" class="form-input" id="p_name" placeholder="程序烽">
        </div>
        <div class="form-group">
          <label class="form-label">职位/头衔</label>
          <input type="text" class="form-input" id="p_title" placeholder="企业战略顾问 · AI落地专家">
        </div>
        <div class="form-group">
          <label class="form-label">头像（Emoji 或图片URL）</label>
          <input type="text" class="form-input" id="p_avatar" placeholder="🔥 或 https://...">
        </div>
        <div class="form-group">
          <label class="form-label">个人介绍（第一段）</label>
          <textarea class="form-textarea" id="p_desc1" style="min-height:80px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">个人介绍（第二段）</label>
          <textarea class="form-textarea" id="p_desc2" style="min-height:80px;"></textarea>
        </div>
      </div>

      <div class="editor-panel">
        <h2 class="editor-panel-title">📊 数据统计</h2>
        <p class="editor-panel-desc">关于区域下方的3个数据展示。</p>

        <div class="form-row form-row-3">
          <div class="form-group">
            <label class="form-label">数据1 - 数值</label>
            <input type="number" class="form-input" id="s1_num" value="6">
            <input type="text" class="form-input" id="s1_label" placeholder="业务领域" style="margin-top:0.5rem;">
          </div>
          <div class="form-group">
            <label class="form-label">数据2 - 数值</label>
            <input type="number" class="form-input" id="s2_num" value="150">
            <input type="text" class="form-input" id="s2_label" placeholder="服务客户" style="margin-top:0.5rem;">
          </div>
          <div class="form-group">
            <label class="form-label">数据3 - 数值</label>
            <input type="number" class="form-input" id="s3_num" value="100">
            <input type="text" class="form-input" id="s3_label" placeholder="交付达成%" style="margin-top:0.5rem;">
          </div>
        </div>

        <h2 class="editor-panel-title" style="margin-top:2rem;">📈 首页大数字统计</h2>
        <p class="editor-panel-desc">首页主视觉下方的4个统计数字（4个一组）。</p>
        <div class="form-row form-row-3">
          <div class="form-group">
            <label class="form-label">统计1</label>
            <input type="number" class="form-input" id="h1_num" value="6">
            <input type="text" class="form-input" id="h1_label" placeholder="主营业务" style="margin-top:0.5rem;">
          </div>
          <div class="form-group">
            <label class="form-label">统计2</label>
            <input type="number" class="form-input" id="h2_num" value="150">
            <input type="text" class="form-input" id="h2_label" placeholder="成功案例" style="margin-top:0.5rem;">
          </div>
          <div class="form-group">
            <label class="form-label">统计3</label>
            <input type="number" class="form-input" id="h3_num" value="20">
            <input type="text" class="form-input" id="h3_label" placeholder="行业经验" style="margin-top:0.5rem;">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">统计4 - 数值</label>
            <input type="number" class="form-input" id="h4_num" value="98">
          </div>
          <div class="form-group">
            <label class="form-label">统计4 - 标签</label>
            <input type="text" class="form-input" id="h4_label" placeholder="客户满意度%">
          </div>
        </div>
      </div>

      <div class="editor-actions">
        <button class="btn btn-primary" id="saveBtn">保存所有设置</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/security.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      checkAuth();
      document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); logout(); });
      loadProfile();
      document.getElementById('saveBtn').addEventListener('click', saveProfile);
    });

    async function loadProfile() {
      const p = await DataStore.fetchProfile();
      document.getElementById('p_name').value = p.name || '';
      document.getElementById('p_title').value = p.title || '';
      document.getElementById('p_avatar').value = p.avatar || '🔥';

      // 拆分 desc
      const descs = (p.desc || '').split('\n\n');
      document.getElementById('p_desc1').value = descs[0] || '';
      document.getElementById('p_desc2').value = descs[1] || '';

      // stats
      const stats = p.stats || [];
      for (let i = 0; i < 3; i++) {
        if (stats[i]) {
          document.getElementById(`s${i+1}_num`).value = stats[i].num;
          document.getElementById(`s${i+1}_label`).value = stats[i].label;
        }
      }

      // home stats
      const homeStats = p.homeStats || [
        { num: 6, label: '主营业务' },
        { num: 150, label: '成功案例' },
        { num: 20, label: '行业经验' },
        { num: 98, label: '客户满意度%' }
      ];
      for (let i = 0; i < 4; i++) {
        if (homeStats[i]) {
          document.getElementById(`h${i+1}_num`).value = homeStats[i].num;
          document.getElementById(`h${i+1}_label`).value = homeStats[i].label;
        }
      }
    }

    async function saveProfile() {
      const desc1 = document.getElementById('p_desc1').value.trim();
      const desc2 = document.getElementById('p_desc2').value.trim();
      const desc = [desc1, desc2].filter(Boolean).join('\n\n');

      const data = {
        name: document.getElementById('p_name').value.trim(),
        title: document.getElementById('p_title').value.trim(),
        avatar: document.getElementById('p_avatar').value.trim() || '🔥',
        desc,
        stats: [
          { num: parseInt(document.getElementById('s1_num').value), label: document.getElementById('s1_label').value.trim() },
          { num: parseInt(document.getElementById('s2_num').value), label: document.getElementById('s2_label').value.trim() },
          { num: parseInt(document.getElementById('s3_num').value), label: document.getElementById('s3_label').value.trim() }
        ],
        homeStats: [
          { num: parseInt(document.getElementById('h1_num').value), label: document.getElementById('h1_label').value.trim() },
          { num: parseInt(document.getElementById('h2_num').value), label: document.getElementById('h2_label').value.trim() },
          { num: parseInt(document.getElementById('h3_num').value), label: document.getElementById('h3_label').value.trim() },
          { num: parseInt(document.getElementById('h4_num').value), label: document.getElementById('h4_label').value.trim() }
        ]
      };

      await DataStore.saveProfile(data);
      showToast('已保存', 'success');
    }
  </script>
</body>
</html>
