<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客文章管理 - 烽审榜 CMS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="../assets/images/logo.png" alt="烽审榜" class="sidebar-logo">
        <span>烽审榜 CMS</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">📊 仪表盘</a>
        <a href="profile.html">👤 关于我</a>
        <a href="services.html">🎯 主营业务</a>
        <a href="blog.html" class="active">📝 博客文章</a>
        <a href="cases.html">🏆 客户案例</a>
        <a href="ads.html">📢 广告位</a>
        <a href="seo.html">🔍 全局SEO</a>
        <a href="settings.html">⚙️ 站点设置</a>
        <a href="audit.html">🛡️ 安全审计</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../index.html" target="_blank">🌐 查看站点</a>
        <a href="#" id="logoutBtn">🚪 退出登录</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">博客文章管理</h1>
        <p class="page-desc">发布技术或业务洞察文章，每篇支持独立 SEO 配置。</p>
      </div>

      <div class="list-toolbar">
        <div class="list-search">
          <input type="text" id="searchInput" placeholder="搜索文章...">
        </div>
        <button class="btn btn-primary" id="addBtn">+ 新增文章</button>
      </div>

      <table class="list-table">
        <thead>
          <tr>
            <th>标题</th>
            <th>分类</th>
            <th>作者</th>
            <th>发布时间</th>
            <th>阅读时长</th>
            <th>SEO</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="blogTbody"></tbody>
      </table>
    </main>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal" style="max-width:760px;">
      <h2 class="modal-title" id="modalTitle">编辑文章</h2>

      <div class="tabs">
        <button class="tab active" data-tab="basic">文章内容</button>
        <button class="tab" data-tab="seo">SEO 设置</button>
      </div>

      <div class="tab-content active" data-tab="basic">
        <div class="form-group">
          <label class="form-label">文章 ID（唯一标识）</label>
          <input type="text" class="form-input" id="f_id" placeholder="例如：geo-ai-search-2026">
        </div>
        <div class="form-group">
          <label class="form-label">文章标题</label>
          <input type="text" class="form-input" id="f_title" placeholder="文章标题">
        </div>
        <div class="form-row form-row-3">
          <div class="form-group">
            <label class="form-label">分类</label>
            <select class="form-select" id="f_category">
              <option value="tech">💻 技术</option>
              <option value="business">📈 业务</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">作者</label>
            <input type="text" class="form-input" id="f_author" value="烽审榜">
          </div>
          <div class="form-group">
            <label class="form-label">阅读时长（分钟）</label>
            <input type="number" class="form-input" id="f_readTime" value="8">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">标签（逗号分隔）</label>
          <input type="text" class="form-input" id="f_tags" placeholder="AI, 数字化, 转型">
        </div>
        <div class="form-group">
          <label class="form-label">摘要</label>
          <textarea class="form-textarea" id="f_summary" placeholder="文章摘要..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">正文内容（支持 HTML）</label>
          <textarea class="form-textarea" id="f_content" placeholder="<p>正文内容...</p>" style="min-height:200px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">封面图 URL</label>
          <input type="text" class="form-input" id="f_coverImage" placeholder="../assets/images/blog/xxx.jpg">
        </div>
        <div class="form-group">
          <label class="form-label">发布时间</label>
          <input type="date" class="form-input" id="f_publishDate">
        </div>
      </div>

      <div class="tab-content" data-tab="seo">
        <div class="form-group">
          <label class="form-label">SEO 标题（Title）</label>
          <input type="text" class="form-input" id="f_seo_title" placeholder="搜索引擎结果中的标题">
          <p class="form-hint">字符数: <span id="seoTitleLen">0</span> / 60</p>
        </div>
        <div class="form-group">
          <label class="form-label">SEO 描述（Description）</label>
          <textarea class="form-textarea" id="f_seo_description" placeholder="搜索引擎结果中的描述" style="min-height:80px;"></textarea>
          <p class="form-hint">字符数: <span id="seoDescLen">0</span> / 160</p>
        </div>
        <div class="form-group">
          <label class="form-label">SEO 关键词</label>
          <input type="text" class="form-input" id="f_seo_keywords" placeholder="关键词1,关键词2">
        </div>
        <div class="form-group">
          <label class="form-label">OG 分享图</label>
          <input type="text" class="form-input" id="f_seo_ogImage" placeholder="社交分享时的图片URL">
        </div>
        <div class="seo-badge" id="seoScoreBadge">SEO 评分: 0</div>
      </div>

      <div class="editor-actions">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/security.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="admin.js"></script>
  <script src="admin-blog.js"></script>
</body>
</html>
