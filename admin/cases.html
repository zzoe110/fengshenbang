<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户案例管理 - 烽审榜 CMS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="../assets/images/logo.png" alt="烽审榜" class="sidebar-logo">
        <span>烽审榜 CMS</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">📊 仪表盘</a>
        <a href="profile.html">👤 关于我</a>
        <a href="services.html">🎯 主营业务</a>
        <a href="blog.html">📝 博客文章</a>
        <a href="cases.html" class="active">🏆 客户案例</a>
        <a href="ads.html">📢 广告位</a>
        <a href="seo.html">🔍 全局SEO</a>
        <a href="settings.html">⚙️ 站点设置</a>
        <a href="audit.html">🛡️ 安全审计</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../index.html" target="_blank">🌐 查看站点</a>
        <a href="#" id="logoutBtn">🚪 退出登录</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">客户案例管理</h1>
        <p class="page-desc">发布真实落地成果，展示业务实力。支持 SEO 独立配置。</p>
      </div>

      <div class="list-toolbar">
        <div class="list-search">
          <input type="text" id="searchInput" placeholder="搜索案例...">
        </div>
        <button class="btn btn-primary" id="addBtn">+ 新增案例</button>
      </div>

      <table class="list-table">
        <thead>
          <tr>
            <th>标题</th>
            <th>客户</th>
            <th>行业</th>
            <th>业务</th>
            <th>发布日期</th>
            <th>SEO</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="casesTbody"></tbody>
      </table>
    </main>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal" style="max-width:760px;">
      <h2 class="modal-title" id="modalTitle">编辑案例</h2>

      <div class="tabs">
        <button class="tab active" data-tab="basic">案例内容</button>
        <button class="tab" data-tab="seo">SEO 设置</button>
      </div>

      <div class="tab-content active" data-tab="basic">
        <div class="form-group">
          <label class="form-label">案例 ID</label>
          <input type="text" class="form-input" id="f_id" placeholder="例如：case-dental-guizhou">
        </div>
        <div class="form-group">
          <label class="form-label">案例标题</label>
          <input type="text" class="form-input" id="f_title" placeholder="案例标题">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">客户名称</label>
            <input type="text" class="form-input" id="f_client" placeholder="客户名称">
          </div>
          <div class="form-group">
            <label class="form-label">所属行业</label>
            <input type="text" class="form-input" id="f_industry" placeholder="例如：口腔医疗">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">关联业务（业务 ID）</label>
          <select class="form-select" id="f_serviceId">
            <option value="">选择关联业务</option>
            <option value="brand-operations">企业品牌运营</option>
            <option value="dental-operations">口腔内外运营</option>
            <option value="traditional-planning">传统企业策划</option>
            <option value="youtuber">YouTuBer</option>
            <option value="dental-geo">口腔GEO优化</option>
            <option value="ai-empowerment">AI落地赋能</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">案例简介</label>
          <textarea class="form-textarea" id="f_summary" placeholder="案例简介..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">核心数据（每行一个，格式：标签\|数值）</label>
          <textarea class="form-textarea" id="f_metrics" placeholder="AI搜索曝光\|+400%&#10;到店咨询\|+180%&#10;成交转化\|+95%" style="min-height:100px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">发布日期</label>
          <input type="date" class="form-input" id="f_publishDate">
        </div>
      </div>

      <div class="tab-content" data-tab="seo">
        <div class="form-group">
          <label class="form-label">SEO 标题</label>
          <input type="text" class="form-input" id="f_seo_title" placeholder="搜索引擎结果标题">
          <p class="form-hint">字符数: <span id="seoTitleLen">0</span> / 60</p>
        </div>
        <div class="form-group">
          <label class="form-label">SEO 描述</label>
          <textarea class="form-textarea" id="f_seo_description" placeholder="搜索引擎结果描述" style="min-height:80px;"></textarea>
          <p class="form-hint">字符数: <span id="seoDescLen">0</span> / 160</p>
        </div>
        <div class="form-group">
          <label class="form-label">SEO 关键词</label>
          <input type="text" class="form-input" id="f_seo_keywords" placeholder="关键词1,关键词2">
        </div>
        <div class="form-group">
          <label class="form-label">OG 分享图</label>
          <input type="text" class="form-input" id="f_seo_ogImage" placeholder="分享图URL">
        </div>
        <div class="seo-badge" id="seoScoreBadge">SEO 评分: 0</div>
      </div>

      <div class="editor-actions">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/security.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="admin.js"></script>
  <script src="admin-cases.js"></script>
</body>
</html>
