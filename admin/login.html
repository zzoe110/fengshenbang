<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - 烽审榜 CMS</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;">

  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">
  <div class="login-bg">
    <div class="login-card">
      <div class="login-header">
        <img src="../assets/images/logo.png" alt="烽审榜" class="login-logo">
        <h1 class="login-title">烽审榜 <span class="gold">CMS</span></h1>
        <p class="login-subtitle">管理工作室网站内容</p>
      </div>

      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label">账号</label>
          <input type="text" class="form-input" id="username" placeholder="请输入账号" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="password" placeholder="请输入密码" required autocomplete="current-password">
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">登 录</button>
      </form>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/security.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定登录表单
      document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        await handleLogin();
      });
    });

    async function handleLogin() {
      const err = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;

      err.style.color = '';
      err.textContent = '';
      btn.disabled = true;
      btn.textContent = '验证中...';

      try {
        const res = await API.login(u, p);
        if (res && res.token) {
          sessionStorage.setItem('fsb_admin_token', res.token);
          sessionStorage.setItem('fsb_admin_user', res.user || u);
          err.style.color = '#4caf50';
          err.textContent = '✓ 登录成功，正在跳转...';
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
        } else {
          throw new Error('登录失败，请重试');
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = '登 录';
        err.style.color = '#ff6b6b';
        err.textContent = (e && e.message) ? e.message : '账号或密码错误';
      }
    }
  </script>
</body>
</html>
